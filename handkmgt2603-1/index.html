<main class="main-content">
        <div class="welcome-section">
            <h1 class="welcome-title">어서오세요, 서재용 대표님!</h1>
            <p>전통의 기와 아래, 스마트한 관리가 흐릅니다.</p>
        </div>

        <div class="dashboard-grid">
            
            <div class="card">
                <h2 class="card-title">객실 현황</h2>
                <img src="main.jpg" alt="금당채 전경" class="hanok-photo">
                <div class="status-item"><span>선비채 (A동)</span><span class="alert">점검중</span></div>
                <div class="status-item"><span>금당채 (B동)</span><span>이용중</span></div>
                <div class="status-item"><span>조경채 (C동)</span><span style="color:green">예약가능</span></div>
            </div>

            <div class="card">
                <h2 class="card-title">오늘의 주요 일정</h2>
                <div style="padding: 10px; line-height: 2;">
                    <p>• 10:00 - 퇴실 객실 청소 확인</p>
                    <p style="color: var(--gd-primary-green); font-weight: bold;">• 14:00 - 꽃게 김치 판로 회의</p>
                    <p>• 18:00 - 야간 조명 점검</p>
                </div>
            </div>

            <div class="card">
                <h2 class="card-title">유지보수 알림</h2>
                <img src="night.jpg" alt="금당채 야경" class="hanok-photo">
                <div class="status-item"><span>마당 조명 교체</span><span class="alert">완료</span></div>
                <div class="status-item"><span>참나무 장작</span><span>재고 확인</span></div>
            </div>

            <div class="card" style="border: 2px solid var(--gd-primary-green);">
                <h2 class="card-title">🛠️ 실시간 상태 업데이트</h2>
                <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 10px;">
                    <div>
                        <label style="display: block; font-size: 0.9rem; margin-bottom: 5px;">객실 선택</label>
                        <select id="room-select" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                            <option>선비채 (A동)</option>
                            <option>금당채 (B동)</option>
                            <option>조경채 (C동)</option>
                        </select>
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.9rem; margin-bottom: 5px;">새로운 상태 입력</label>
                        <input type="text" id="status-input" placeholder="예: 예약가능, 이용중, 청소중" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                    </div>
                    <button onclick="updateStatus()" style="width: 100%; padding: 15px; background: var(--gd-primary-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                        화면 즉시 업데이트
                    </button>
                    <p style="font-size: 0.8rem; color: #888; text-align: center;">※ 현재는 임시 업데이트 모드입니다. (새로고침하면 복구됨)</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        // [추가] 화면상의 데이터를 임시로 바꾸는 마법 코드
        function updateStatus() {
            const roomName = document.getElementById('room-select').value;
            const newStatus = document.getElementById('status-input').value;
            
            if(!newStatus) { alert("상태를 입력해주세요!"); return; }

            // 화면에서 해당 객실 이름을 찾아 그 옆의 상태 글자를 바꿉니다.
            const items = document.querySelectorAll('.status-item');
            items.forEach(item => {
                if(item.innerText.includes(roomName)) {
                    item.querySelector('span:last-child').innerText = newStatus;
                    item.querySelector('span:last-child').style.color = (newStatus === "예약가능") ? "green" : "#d9534f";
                }
            });
            alert(roomName + "의 상태가 " + newStatus + "(으)로 변경되었습니다!");
        }

        /* (기존 시계/날씨 스크립트 생략...) */
    </script>
