<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금당채 한옥마을 스마트 관리 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gd-primary-brown: #7F5539; 
            --gd-charcoal: #333333;       
            --gd-bg-cream: #F9F7F2;       
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --border-radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--gd-bg-cream); color: var(--gd-charcoal); padding-top: 80px; }

        /* [헤더 섹션] */
        .header {
            background-color: white; padding: 10px 30px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03); position: fixed; width: 100%; top: 0; z-index: 1000;
        }
        .logo-area { display: flex; align-items: center; text-decoration: none; }
        .logo-image { height: 45px; margin-right: 12px; }
        .system-name { font-size: 1.1rem; font-weight: 500; color: var(--gd-primary-brown); }

        .info-widget { display: flex; align-items: center; gap: 15px; font-size: 0.9rem; }
        .weather-box { background: #f0f4f8; padding: 5px 12px; border-radius: 20px; color: var(--gd-primary-brown); font-weight: bold; }
        #digital-clock { font-family: 'Courier New', Courier, monospace; font-weight: bold; }

        /* [메인 컨텐츠] */
        .main-content { padding: 30px; max-width: 1200px; margin: 0 auto; }
        
        /* [중요: 사진 스타일 효과 - 대표님이 요청하신 부분!] */
        .hanok-photo {
            width: 100%; height: 180px; object-fit: cover;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease; /* 부드러운 움직임 */
            margin-bottom: 15px;
            cursor: pointer;
        }
        .hanok-photo:hover {
            transform: scale(1.03); /* 마우스 올리면 살짝 커짐 */
        }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: var(--border-radius); box-shadow: var(--shadow); padding: 20px; }
        .card-title { font-family: 'Gowun Batang', serif; font-size: 1.4rem; color: var(--gd-primary-brown); margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .status-item { display: flex; justify-content: space-between; margin-bottom: 10px; padding: 10px; background: #fafafa; border-radius: 8px; }
        .alert { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">
        <a href="#" class="logo-area">
            <img src="https://i.ibb.co/6P0fM-hT/Geumdangchae-Hanok-Village-Management-System-Logo.png" alt="금당채 로고" class="logo-image">
            <span class="system-name">금당채 관리 시스템</span>
        </a>
        <div class="info-widget">
            <div id="weather" class="weather-box">날씨 로딩중...</div>
            <div id="digital-clock">00:00:00</div>
        </div>
    </header>

    <main class="main-content">
        <div class="dashboard-grid">
            
            <div class="card">
                <h2 class="card-title">객실 현황</h2>
                <img src="https://images.unsplash.com/photo-1590212151175-e58edd96185b?auto=format&fit=crop&w=800&q=80" alt="한옥 전경" class="hanok-photo">
                <div class="status-item"><span>선비채 (A동)</span><span class="alert">점검중</span></div>
                <div class="status-item"><span>금당채 (B동)</span><span>이용중</span></div>
                <div class="status-item"><span>조경채 (C동)</span><span style="color:green">예약가능</span></div>
            </div>

            <div class="card">
                <h2 class="card-title">오늘의 일정</h2>
                <div style="padding: 10px; line-height: 2;">
                    <p>• 10:00 - 퇴실 객실 청소 상태 확인</p>
                    <p style="color: var(--gd-primary-brown); font-weight: bold;">• 14:00 - 꽃게 김치 신규 판로 회의</p>
                    <p>• 16:00 - 정원 화단 물주기 및 전지</p>
                </div>
            </div>

            <div class="card">
                <h2 class="card-title">유지보수 알림</h2>
                <img src="https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?auto=format&fit=crop&w=800&q=80" alt="시설 관리" class="hanok-photo">
                <div class="status-item"><span>창호지 보수</span><span class="alert">D-2</span></div>
                <div class="status-item"><span>참나무 장작</span><span>재고 넉넉</span></div>
            </div>

        </div>
    </main>

    <script>
        // 시계 기능
        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 날씨 기능 (천안 성거읍)
        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.88&longitude=127.21&current_weather=true');
                const data = await res.json();
                document.getElementById('weather').innerText = `성거읍 ${data.current_weather.temperature}°C`;
            } catch (e) { document.getElementById('weather').innerText = "날씨 연결 실패"; }
        }
        fetchWeather();
    </script>
</body>
</html>
