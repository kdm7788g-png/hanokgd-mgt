<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금당채 한옥마을 관리 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gd-primary-brown: #7F5539; 
            --gd-charcoal: #333333;       
            --gd-bg-cream: #F9F7F2;       
            --gd-grey-light: #4A4A4A;    
            --gd-accent: #E1EADD;        
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --border-radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--gd-bg-cream);
            color: var(--gd-charcoal);
            line-height: 1.6;
        }

        .header {
            background-color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            position: fixed; width: 100%; top: 0; z-index: 1000;
        }

        .logo-link { text-decoration: none; display: flex; align-items: center; }
        .logo-image { height: 50px; width: auto; margin-right: 15px; border-radius: 5px; }
        .system-name { font-size: 1.2rem; font-weight: 500; color: var(--gd-primary-brown); }

        .main-content { margin-top: 100px; padding: 40px; max-width: 1200px; margin-left: auto; margin-right: auto; }
        .welcome-section { margin-bottom: 40px; text-align: center; }
        .welcome-title { font-family: 'Gowun Batang', serif; font-size: 2.5rem; color: var(--gd-charcoal); margin-bottom: 10px; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { background-color: white; border-radius: var(--border-radius); box-shadow: var(--shadow); padding: 25px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card-title { font-family: 'Gowun Batang', serif; font-size: 1.4rem; color: var(--gd-primary-brown); margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .status-item { display: flex; justify-content: space-between; margin-bottom: 12px; padding: 8px; border-radius: 8px; background: #fcfcfc; }
        .status-label { font-weight: 500; }
        .status-value { color: #555; }
        .alert { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">
        <a href="#" class="logo-link">
            <img src="https://i.ibb.co/6P0fM-hT/Geumdangchae-Hanok-Village-Management-System-Logo.png" alt="금당채 로고" class="logo-image">
            <span class="system-name">금당채 관리 시스템</span>
        </a>
        <div style="color: var(--gd-primary-brown); font-weight: bold;">서재용 대표님 접속 중</div>
    </header>

    <main class="main-content">
        <div class="welcome-section">
            <h1 class="welcome-title">금당채 한옥마을 관리 대시보드</h1>
            <p>전통의 가치를 지키는 스마트한 관리의 시작</p>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h2 class="card-title">객실 예약 현황</h2>
                <div class="status-item"><span class="status-label">독채 A (선비채)</span><span class="status-value alert">점검중</span></div>
                <div class="status-item"><span class="status-label">독채 B (금당채)</span><span class="status-value">이용중</span></div>
                <div class="status-item"><span class="status-label">독채 C (조경채)</span><span class="status-value" style="color:green">예약가능</span></div>
            </div>

            <div class="card">
                <h2 class="card-title">비품 및 유지보수</h2>
                <div class="status-item"><span class="status-label">한지 교체</span><span class="status-value alert">D-2</span></div>
                <div class="status-item"><span class="status-label">장작 재고</span><span class="status-value">충분</span></div>
                <div class="status-item"><span class="status-label">조경 관리</span><span class="status-value">이번주 수요일</span></div>
            </div>

            <div class="card">
                <h2 class="card-title">오늘의 할 일</h2>
                <p style="font-size: 0.9rem; color: #666;">• 오전 10시: 퇴실 객실 점검<br>• 오후 2시: 꽃게 김치 사업 미팅<br>• 오후 4시: 정원 물주기</p>
            </div>
        </div>
    </main>

</body>
</html>
